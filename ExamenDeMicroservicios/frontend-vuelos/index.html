<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Vuelos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>Registrar Nuevo Vuelo</h2>
    
    <div class="form-card">
      <form id="formVuelo">
        <div class="form-group">
          <label for="nombre">Nombre o Destino</label>
          <input type="text" id="nombre" required>
        </div>

        <div class="form-group">
          <label for="precio">Precio ($)</label>
          <input type="number" id="precio" step="0.01" min="0" required>
        </div>

        <div class="form-group">
          <label for="stock">Disponibilidad (Stock)</label>
          <input type="number" id="stock" min="0" required>
        </div>

        <button type="submit">Guardar Vuelo</button>
      </form>
    </div>

    <p id="mensaje"></p>

    <h2>Lista de Vuelos</h2>
    <div id="listaVuelos"></div>
  </div>

  <script src="dist/index.js"></script>
</body>
</html>
