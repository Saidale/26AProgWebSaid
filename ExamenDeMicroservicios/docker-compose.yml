services:
  postgres:
    image: postgres:16-alpine
    container_name: examen_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: examen_microservicios
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend-pasajeros:
    build: ./backend-pasajeros
    container_name: backend_pasajeros
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: examen_microservicios
    depends_on:
      - postgres

  frontend-pasajeros:
    build: ./frontend-pasajeros
    container_name: frontend_pasajeros
    restart: always
    ports:
      - "5171:5171"
    depends_on:
      - backend-pasajeros

  backend-vuelos:
    build: ./backend-vuelos
    container_name: backend_vuelos
    restart: always
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: examen_microservicios
    depends_on:
      - postgres

  frontend-vuelos:
    build: ./frontend-vuelos
    container_name: frontend_vuelos
    restart: always
    ports:
      - "5172:5172"
    depends_on:
      - backend-vuelos

  backend-asientos:
    build: ./backend-asientos
    container_name: backend_asientos
    restart: always
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin
      DB_NAME: examen_microservicios
    depends_on:
      - postgres

  frontend-asientos:
    build: ./frontend-asientos
    container_name: frontend_asientos
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend-asientos

volumes:
  postgres_data: